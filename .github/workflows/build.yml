name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Get version
        id: version
        run: |
          $content = Get-Content "src/lyrics_matcher/__init__.py" -Raw
          if ($content -match 'version = "(.*?)"') {
            $ver = $matches[1]
            echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
            echo "VERSION_STR=v$ver" >> $env:GITHUB_OUTPUT
          }

      - name: Build executable
        run: |
          pip install pyinstaller pillow
          pyinstaller --name LyricsMatcher --onedir --console false --distpath dist --add-data "README.md;." src/lyrics_matcher/__main__.py

      - name: Copy files
        run: |
          Copy-Item "README.md" "dist/LyricsMatcher/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "dist/LyricsMatcher/" -ErrorAction SilentlyContinue

      - name: Create zip
        run: |
          $version = "${{ steps.version.outputs.VERSION_STR }}"
          Compress-Archive -Path "dist/LyricsMatcher/*" -DestinationPath "dist/LyricsMatcher-$version-win.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsMatcher-windows
          path: dist/LyricsMatcher-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LyricsMatcher-windows
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LyricsMatcher-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}