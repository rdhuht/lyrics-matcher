name: Build and Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  release:
    types: [published]

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller pillow

      - name: Get version
        id: version
        run: |
          $version = Select-String -Path "src/lyrics_matcher/__init__.py" -Pattern 'version = "(.*?)"' | ForEach-Object { $_.Matches.Groups[1].Value }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION_STR=v$version" >> $env:GITHUB_OUTPUT

      - name: Build executable
        run: |
          pyinstaller `
            --name LyricsMatcher `
            --onedir `
            --console false `
            --add-data "README.md;." `
            --hidden-import PIL._tkinter_finder `
            --hidden-import tkinter `
            --hidden-import mutagen `
            --hidden-import mutagen.mp3 `
            --hidden-import mutagen.flac `
            --hidden-import mutagen.oggvorbis `
            --hidden-import mutagen.mp4 `
            --hidden-import mutagen.wave `
            --hidden-import requests `
            --collect-all mutagen `
            --collect-all tkinter `
            src/lyrics_matcher/__main__.py

      - name: Copy files to distribution
        run: |
          Copy-Item "README.md" "dist/LyricsMatcher/"
          Copy-Item "LICENSE" "dist/LyricsMatcher/"

      - name: Create zip archive
        run: |
          $version = "${{ steps.version.outputs.VERSION_STR }}"
          Compress-Archive -Path "dist/LyricsMatcher/*" -DestinationPath "dist/LyricsMatcher-$version-win.zip" -Force
          Get-ChildItem -Path "dist" -Filter "*.zip" | Format-Table -AutoSize

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsMatcher-windows-${{ github.run_number }}
          path: dist/LyricsMatcher-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: LyricsMatcher-windows-${{ github.run_number }}
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LyricsMatcher-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}