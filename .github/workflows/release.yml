name: Build and Release

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pillow

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name "LyricsMatcher" --distpath "dist" --add-data "src;src" --hidden-import tkinter --hidden-import tkinter.ttk --hidden-import tkinter.filedialog --hidden-import tkinter.messagebox --collect-all mutagen run.py
        shell: cmd

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LyricsMatcher.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}